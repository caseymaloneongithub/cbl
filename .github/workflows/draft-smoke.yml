name: Draft Smoke Test

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "server/**"
      - "shared/**"
      - "script/**"
      - "docker-compose.dev.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/draft-smoke.yml"

jobs:
  draft-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker stack
        run: docker compose -f docker-compose.dev.yml up -d db app

      - name: Wait for app
        shell: bash
        run: |
          for i in {1..90}; do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5000/ || true)"
            if [ "$code" = "200" ] || [ "$code" = "401" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready on :5000"
          docker compose -f docker-compose.dev.yml logs --tail=200 app
          exit 1

      - name: Seed deterministic draft test data
        shell: bash
        run: docker compose -f docker-compose.dev.yml exec -T db psql -U postgres -d cbl < script/sql/seed_draft_smoke.sql

      - name: Run draft full test
        shell: pwsh
        env:
          DRAFT_TEST_BASE_URL: http://localhost:5000
        run: ./script/draft-full-test.ps1

      - name: Upload draft test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draft-smoke-artifacts
          path: attached_assets/draft-full-test/

      - name: Show service logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.dev.yml logs --tail=250 app
          docker compose -f docker-compose.dev.yml logs --tail=120 db
